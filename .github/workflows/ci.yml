# ============================================
# ✅ テスト・lint 自動実行
# PRごとにコードの品質チェックとテストを自動で行う
# ============================================
name: CI

on:
  pull_request:
    types: [opened, synchronize]
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: パッケージインストール
        run: pnpm install --frozen-lockfile

      - name: lint チェック
        run: pnpm run lint

      - name: 型チェック
        run: pnpm exec tsc --noEmit

      # package.json に test スクリプトを追加したら有効化
      # - name: テスト実行
      #   run: pnpm run test -- --run