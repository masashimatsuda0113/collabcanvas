# ============================================
# 💬 @claude メンション対応
# PRやIssueで「@claude」と書くと、Claudeが応答する
# ============================================
name: Claude Interactive

# いつ動くか？ → PRやIssueにコメントされたとき
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: write         # コードを修正する権限
  pull-requests: write    # PRにコメント・修正コミットする権限
  issues: read            # Issueを読む権限

jobs:
  respond:
    # @claude が含まれるコメントだけ反応する
    if: |
      contains(github.event.comment.body, '@claude')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}